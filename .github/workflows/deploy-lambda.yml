name: Deploy Lambda

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: develop
            environment: staging
            aws_region: AWS_REGION_STAGING
            aws_role_arn: AWS_ROLE_ARN_STAGING
            lambda_function_name: LAMBDA_FUNCTION_NAME_STAGING
          - branch: main
            environment: production
            aws_region: AWS_REGION_PRODUCTION
            aws_role_arn: AWS_ROLE_ARN_PRODUCTION
            lambda_function_name: LAMBDA_FUNCTION_NAME_PRODUCTION
    if: github.ref_name == matrix.branch
    environment: ${{ matrix.environment }}
    env:
      AWS_REGION: ${{ secrets[matrix.aws_region] }}
      AWS_ROLE_ARN: ${{ secrets[matrix.aws_role_arn] }}
      LAMBDA_FUNCTION_NAME: ${{ secrets[matrix.lambda_function_name] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Package Lambda artifact
        run: make package-lambda

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://dist/lambda/appbuilder-grader-lambda.zip \
            --publish